name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to build"
        required: false
        default: "main"
  push:
    tags:
      - "jacquard-core-*"

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

env:
  OCAML_COMPILER: 5.1.1
  TMPDIR: ${{ github.workspace }}/.scratch/tmp

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-15-intel
            target: macos-x86_64
          - os: macos-15
            target: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Prepare temporary storage
        run: mkdir -p "$TMPDIR"

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3.6.1
        with:
          ocaml-compiler: ${{ env.OCAML_COMPILER }}

      - name: Install dependencies
        run: opam install --deps-only . -y

      - name: Build and package
        run: scripts/release/package-binary.sh "${{ matrix.target }}"

      - name: Smoke packaged commands
        shell: bash
        run: |
          (cd dist && shasum -a 256 -c "jacquard-${{ matrix.target }}.tar.gz.sha256")
          smoke="$GITHUB_WORKSPACE/.scratch/jacquard-smoke"
          rm -rf "$smoke"
          mkdir -p "$smoke"
          tar -xzf "dist/jacquard-${{ matrix.target }}.tar.gz" -C "$smoke"
          root=$(find "$smoke" -mindepth 1 -maxdepth 1 -type d -name 'jacquard-*' | head -1)
          "$root/bin/jacquard" --version
          "$root/bin/jac" --version
          test "$("$root/bin/jac" run "$root/share/jacquard/demos/basics/m1-fact.jac")" = "120"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jacquard-${{ matrix.target }}
          if-no-files-found: error
          path: |
            dist/jacquard-${{ matrix.target }}.tar.gz
            dist/jacquard-${{ matrix.target }}.tar.gz.sha256

  github-release:
    name: Attach to GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Prepare temporary storage
        run: mkdir -p "$TMPDIR"

      - name: Download packages
        uses: actions/download-artifact@v6.0.0
        with:
          pattern: jacquard-*
          merge-multiple: true
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            prerelease=
            case "$TAG" in
              *-rc*) prerelease=--prerelease ;;
            esac
            gh release create "$TAG" dist/* \
              --verify-tag \
              --title "$TAG" \
              --notes-file docs/release/0.1/RELEASE-NOTES.md \
              $prerelease
          fi
