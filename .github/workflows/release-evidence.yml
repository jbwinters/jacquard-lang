name: Release Evidence

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to reproduce"
        required: false
        default: "main"
      base:
        description: "Candidate base commit that must be an ancestor"
        required: false
        default: "738dc8e"
  push:
    branches:
      - "release/**"
    tags:
      - "jacquard-core-*"

permissions:
  contents: read

concurrency:
  group: release-evidence-${{ github.ref }}
  cancel-in-progress: false

env:
  OCAML_COMPILER: 5.1.1
  JACQUARD_PRELUDE: ${{ github.workspace }}/prelude
  TMPDIR: ${{ github.workspace }}/.scratch/tmp

jobs:
  reproduce:
    name: Reproduce 0.1 evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout candidate
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Prepare temporary storage
        run: mkdir -p "$TMPDIR"

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3.6.1
        with:
          ocaml-compiler: ${{ env.OCAML_COMPILER }}

      - name: Reproduce release evidence
        run: |
          JACQUARD_RELEASE_REF=HEAD \
          JACQUARD_RELEASE_BASE="${{ github.event.inputs.base || '738dc8e' }}" \
          scripts/release/reproduce-0.1.sh

      - name: Upload evidence transcripts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: jacquard-release-0.1-evidence-${{ github.run_number }}
          if-no-files-found: error
          include-hidden-files: true
          path: |
            docs/release/0.1/
            .scratch/release/0.1/
